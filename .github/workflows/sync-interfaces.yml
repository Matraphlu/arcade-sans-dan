name: Sync Common Interfaces

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'include/IGame.hpp'
      - 'include/IGraphical.hpp'

jobs:
  sync:
    name: Push interfaces to partner repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}

      - name: Clone destination repo
        run: |
          git clone git@github.com:EpitechPGE2-2025/G-OOP-400-NCE-4-1-arcade-4.git dest-repo

      - name: Copy interface files
        run: |
          mkdir -p dest-repo/include
          cp include/IGame.hpp      dest-repo/include/IGame.hpp
          cp include/IGraphical.hpp dest-repo/include/IGraphical.hpp

      - name: Commit and push
        run: |
          cd dest-repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add include/IGame.hpp include/IGraphical.hpp

          if git diff --cached --quiet; then
            echo "No changes to sync — interfaces are already up to date."
            exit 0
          fi

          COMMIT_SHA=${{ github.sha }}
          COMMIT_MSG=${{ github.event.head_commit.message }}
          git commit -m "chore: sync interfaces from arcade-sans-dan (${COMMIT_SHA::7}): ${COMMIT_MSG}"

          git push origin HEAD