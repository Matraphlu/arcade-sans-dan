name: Sync Common Interfaces

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'include/IGame.hpp'
      - 'include/IGraphical.hpp'
      - 'include/Drawable.hpp'
      - 'include/Event.hpp'

jobs:
  sync-repo-4:
    name: Push interfaces to repo 4
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}

      - name: Clone and push
        run: |
          git clone git@github.com:EpitechPGE2-2025/G-OOP-400-NCE-4-1-arcade-4.git dest-repo
          mkdir -p dest-repo/include
          cp include/IGame.hpp      dest-repo/include/IGame.hpp
          cp include/IGraphical.hpp dest-repo/include/IGraphical.hpp
          cp include/Drawable.hpp   dest-repo/include/Drawable.hpp
          cp include/Event.hpp      dest-repo/include/Event.hpp
          cd dest-repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add include/IGame.hpp include/IGraphical.hpp include/Drawable.hpp include/Event.hpp
          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            COMMIT_SHA="${{ github.sha }}"
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            git commit -m "chore: sync interfaces from arcade-sans-dan (${COMMIT_SHA::7}): ${COMMIT_MSG}"
            git push origin HEAD
          fi

  sync-repo-5:
    name: Push interfaces to repo 5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
