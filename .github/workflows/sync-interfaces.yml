          cp include/IGame.hpp      dest-repo/include/IGame.hpp
          cp include/IGraphical.hpp dest-repo/include/IGraphical.hpp
          cp include/Drawable.hpp   dest-repo/include/Drawable.hpp
          cp include/Event.hpp      dest-repo/include/Event.hpp
          cd dest-repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add include/IGame.hpp include/IGraphical.hpp include/Drawable.hpp include/Event.hpp
          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            COMMIT_SHA="${{ github.sha }}"
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            git commit -m "chore: sync interfaces from arcade-sans-dan (${COMMIT_SHA::7}): ${COMMIT_MSG}"
            git push origin HEAD
          fi