          ssh-private-key: ${{ secrets.GIT_SSH_PRIVATE_KEY_5 }}

      - name: Clone and push
        run: |
          git clone git@github.com:EpitechPGE2-2025/G-OOP-400-NCE-4-1-arcade-5.git dest-repo
